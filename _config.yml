# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site Information
title: My Code Blog
subtitle: 分享技术，记录生活
description: 一个关于编程、技术和生活的个人博客
keywords: 编程,技术,博客,JavaScript,Web开发
author: 个人博客
language: zh-CN
timezone: 'Asia/Shanghai'

# URL Configuration
url: https://themycode.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
  lang: zh-CN

# Directory Configuration
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing Configuration
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  open_in_new: false
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

# Code Highlight Configuration (with Highlight.js)
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: '  '
  wrap: true
  hljs: false

# Prism Code Highlighting
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home Page Index Generator
index_generator:
  path: ''
  per_page: 12
  order_by: -date

# Generator Configuration
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
  daily: false

category_generator:
  per_page: 10

tag_generator:
  per_page: 10

# Pagination Configuration
per_page: 12
pagination_dir: page

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format like this:
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Include / Exclude Files
include:
exclude:
ignore:

# Theme Configuration
theme: landscape

# Markdown Rendering Configuration
marked:
  gfm: true
  pedantic: false
  breaks: true
  smartLists: true
  smartypants: true
  modifyAnchors: 0
  autoLink: true

# Feed Plugin Configuration (if using hexo-feed or similar)
feed:
  type: atom
  path: atom.xml
  limit: 20

# Sitemap Configuration (if using hexo-sitemap)
sitemap:
  path: sitemap.xml

# Deployment Configuration
deploy:
  type: git
  repo: https://github.com/themycode/themycode.github.io.git
  branch: master
